    <!-- Main Application Script -->
    <script>
        // Track page view
        gtag('event', 'page_view', {
            page_path: '/json-diff-viewer/',
            page_title: 'JSON 파일 비교 도구'
        });

        // Validation function
        function validateJSON(text) {
            try {
                JSON.parse(text);
                return { valid: true, error: null };
            } catch (e) {
                return { valid: false, error: e.message };
            }
        }

        // Update validation status
        function updateValidationStatus(textareaId, statusId) {
            const textarea = document.getElementById(textareaId);
            const statusEl = document.getElementById(statusId);
            const text = textarea.value.trim();

            if (!text) {
                statusEl.className = 'validation-status empty';
                statusEl.textContent = '준비됨';
                return false;
            }

            const result = validateJSON(text);
            if (result.valid) {
                statusEl.className = 'validation-status valid';
                statusEl.innerHTML = '✓ 유효한 JSON';
                return true;
            } else {
                statusEl.className = 'validation-status invalid';
                statusEl.innerHTML = `✗ ${result.error}`;
                return false;
            }
        }

        // Add event listeners for real-time validation
        document.getElementById('json1').addEventListener('input', function() {
            updateValidationStatus('json1', 'status1');
        });

        document.getElementById('json2').addEventListener('input', function() {
            updateValidationStatus('json2', 'status2');
        });

        // Parse JSON with better error handling
        function parseJSON(text) {
            try {
                return JSON.parse(text);
            } catch (e) {
                return null;
            }
        }

        // Deep comparison function
        function deepCompare(obj1, obj2, path = '') {
            const diffs = [];
            const allKeys = new Set([...Object.keys(obj1 || {}), ...Object.keys(obj2 || {})]);

            for (const key of allKeys) {
                const fullPath = path ? `${path}.${key}` : key;
                const val1 = obj1?.[key];
                const val2 = obj2?.[key];

                if (!(key in (obj1 || {}))) {
                    diffs.push({
                        type: 'added',
                        path: fullPath,
                        key: key,
                        value: val2,
                        oldValue: undefined
                    });
                } else if (!(key in (obj2 || {}))) {
                    diffs.push({
                        type: 'removed',
                        path: fullPath,
                        key: key,
                        value: undefined,
                        oldValue: val1
                    });
                } else if (typeof val1 === 'object' && val1 !== null && typeof val2 === 'object' && val2 !== null && !Array.isArray(val1) && !Array.isArray(val2)) {
                    diffs.push(...deepCompare(val1, val2, fullPath));
                } else if (JSON.stringify(val1) !== JSON.stringify(val2)) {
                    diffs.push({
                        type: 'modified',
                        path: fullPath,
                        key: key,
                        value: val2,
                        oldValue: val1
                    });
                } else {
                    diffs.push({
                        type: 'unchanged',
                        path: fullPath,
                        key: key,
                        value: val2,
                        oldValue: val1
                    });
                }
            }

            return diffs;
        }

        // Build tree structure
        function buildTree(obj, diffs = [], path = '') {
            if (obj === null || typeof obj !== 'object') {
                return '';
            }

            let html = '';
            const keys = Object.keys(obj);

            for (const key of keys) {
                const fullPath = path ? `${path}.${key}` : key;
                const value = obj[key];
                const diff = diffs.find(d => d.path === fullPath);
                const diffType = diff?.type || 'unchanged';

                const isObject = value !== null && typeof value === 'object' && !Array.isArray(value);
                const isArray = Array.isArray(value);

                if (isObject || isArray) {
                    html += `<div class="tree-node ${diffType}">`;
                    html += `<span class="tree-toggle" onclick="toggleTree(this)">▼</span>`;
                    html += `<span class="tree-key">"${key}"</span>`;
                    html += `<div class="tree-children">`;
                    html += buildTree(value, diffs, fullPath);
                    html += `</div></div>`;
                } else {
                    const displayValue = typeof value === 'string' ? `"${value}"` : value;
                    html += `<div class="tree-node ${diffType}"><span class="tree-key">"${key}"</span>: <span class="tree-value">${displayValue}</span></div>`;
                }
            }

            return html;
        }

        // Toggle tree nodes
        function toggleTree(element) {
            const childrenDiv = element.parentElement.querySelector('.tree-children');
            if (childrenDiv) {
                childrenDiv.classList.toggle('hidden');
                element.textContent = childrenDiv.classList.contains('hidden') ? '▶' : '▼';
            }
        }

        // Format JSON
        function formatJSON() {
            gtag('event', 'tool_action', { action: 'format_json' });
            
            const json1 = document.getElementById('json1');
            const json2 = document.getElementById('json2');

            try {
                if (json1.value.trim()) {
                    const parsed1 = JSON.parse(json1.value);
                    json1.value = JSON.stringify(parsed1, null, 2);
                }
            } catch (e) {}

            try {
                if (json2.value.trim()) {
                    const parsed2 = JSON.parse(json2.value);
                    json2.value = JSON.stringify(parsed2, null, 2);
                }
            } catch (e) {}

            updateValidationStatus('json1', 'status1');
            updateValidationStatus('json2', 'status2');
        }

        // Swap JSON
        function swapJSON() {
            gtag('event', 'tool_action', { action: 'swap_json' });
            
            const json1 = document.getElementById('json1');
            const json2 = document.getElementById('json2');
            [json1.value, json2.value] = [json2.value, json1.value];

            updateValidationStatus('json1', 'status1');
            updateValidationStatus('json2', 'status2');
        }

        // Clear all
        function clearAll() {
            gtag('event', 'tool_action', { action: 'clear_all' });
            
            document.getElementById('json1').value = '';
            document.getElementById('json2').value = '';
            document.getElementById('resultsSection').style.display = 'none';
            updateValidationStatus('json1', 'status1');
            updateValidationStatus('json2', 'status2');
        }

        // Compare JSON
        function compareJSON() {
